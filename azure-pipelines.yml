# Azure DevOps Pipeline для сборки Polza Pulse.
# Триггер: тег v* (например, v1.0.11).
# Собирает .exe-инсталлятор через electron-builder и пушит артефакты
# (latest.yml + .exe + .blockmap) в orphan-ветку releases.
# Приложение качает обновления из этой ветки через REST API (NTLM).

trigger:
  tags:
    include:
      - "v*"

pool:
  name: Default
  demands:
    - agent.os -equals Windows_NT

steps:
  - checkout: self
    persistCredentials: true

  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Установка Node.js 20"

  - script: npm ci
    displayName: "Установка зависимостей"

  - script: npm run dist
    displayName: "Сборка .exe + latest.yml (electron-builder)"

  # Пуш артефактов в orphan-ветку releases.
  - powershell: |
      $tag = "$(Build.SourceBranchName)"
      Write-Host "[deploy] tag: $tag"

      git config user.email "pipeline@polza.ai"
      git config user.name "Azure Pipeline"

      # Пересоздаём orphan-ветку releases (без общей истории с main)
      git checkout --orphan releases 2>$null

      # Удаляем всё из рабочей директории, оставляем только артефакты
      git rm -rf . 2>$null

      # Копируем артефакты сборки из release/
      $source = "$(Build.SourcesDirectory)\release"
      Get-ChildItem "$source\*" -Include *.exe, *.yml, *.blockmap | ForEach-Object {
        Copy-Item $_.FullName ./ -Force
        Write-Host "[deploy] copied: $($_.Name)"
      }

      git add .
      git commit -m "Release $tag"
      git push origin releases --force
    displayName: "Push to releases branch"
