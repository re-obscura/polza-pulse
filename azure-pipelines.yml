# Azure DevOps Pipeline для сборки Polza Pulse.
# Триггер: тег v* (например, v1.0.11).
# Собирает .exe-инсталлятор через electron-builder, публикует артефакты:
#   - Polza Pulse Setup X.Y.Z.exe
#   - latest.yml
#   - Polza Pulse Setup X.Y.Z.exe.blockmap
# Эти файлы нужно скопировать на IIS (https://s-tfs.intellectika.ru/polza-updates/)
# для работы автообновления через GenericProvider + NTLM.

trigger:
  tags:
    include:
      - "v*"

pool:
  name: Default
  demands:
    - agent.os -equals Windows_NT

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Установка Node.js 20"

  - script: npm ci
    displayName: "Установка зависимостей"

  - script: npm run dist
    displayName: "Сборка .exe + latest.yml (electron-builder)"

  # Копирование артефактов на IIS-сервер обновлений.
  # Сервер: s-tfs.intellectika.local (192.168.244.147)
  # Путь: \\s-tfs.intellectika.local\C$\inetpub\polza-updates\
  # Требуется: чтобы build-агент имел сетевой доступ к серверу.
  - powershell: |
      $source = "$(Build.SourcesDirectory)\release"
      $dest   = "\\s-tfs.intellectika.local\C$\inetpub\polza-updates"

      # Копируем все файлы: *.exe, *.blockmap, latest.yml, builder-debug.yml
      Write-Host "[deploy] source: $source"
      Write-Host "[deploy] dest:   $dest"
      robocopy $source $dest /NP /NFL /NDL /NJH /NJS
      # robocopy exit code 0..7 = success (1 = copied, 2 = extra, etc.)
      $rc = $LASTEXITCODE
      if ($rc -ge 8) {
        Write-Error "[deploy] robocopy failed with exit code $rc"
        exit 1
      }
      Write-Host "[deploy] done (robocopy exit $rc)"
    displayName: "Деплой на IIS (polza-updates)"

  # Артефакты — для ручной загрузки, если деплой не настроен.
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: "$(Build.SourcesDirectory)/release"
      artifactName: "polza-pulse-release"
    displayName: "Публикация артефактов сборки"
