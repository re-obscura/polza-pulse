# Конфигурация electron-builder для Polza Pulse.
# NSIS installer (.exe) для Windows + автообновление через generic provider.

appId: ai.polza.monitor
productName: Polza Pulse
copyright: Copyright © Polza

directories:
  output: release
  buildResources: build

# Файлы, попадающие в сборку (результат esbuild).
files:
  - dist-main/**
  - dist-preload/**
  - dist-renderer/**
  - icons/**
  - package.json

# Без code signing — внутреннее корпоративное приложение.
forceCodeSigning: false

# Иконка приложения (минимум 256x256) — для установщика и окна.
# electron-builder сам конвертит .png в .ico (Windows) и .icns (macOS).
win:
  icon: icons/logo-dark-256.png
  target:
    - target: nsis
      arch: [x64]
  # Без подписи — внутреннее корпоративное приложение.
  sign: null
  signingHashAlgorithms: null
  certificateFile: null
  certificatePassword: null

mac:
  icon: icons/logo-dark-256.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities
  # Без подписи — для внутреннего использования.
  identity: null

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Polza Pulse

# Генерируем latest.yml (нужно для автообновления).
# Провайдер generic с dummy URL — сам electron-builder ничего не публикует,
# только создаёт файл latest.yml рядом с .exe.
publish:
  provider: generic
  url: "https://example.com/updates"

# Автообновление: артефакты (latest.yml, .exe, .blockmap) копируются в папку
# releases/ ветки dev и скачиваются через Azure DevOps REST API.
